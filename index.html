<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO AI 預測站</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #d32f2f; margin: 0 0 10px 0; }
        .update-time { text-align: center; font-size: 13px; color: #777; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: bold; border-left: 5px solid #d32f2f; padding-left: 10px; margin: 25px 0 15px 0; }
        .prediction-box { background: #fff5f5; border: 2px dashed #ffcdd2; padding: 20px; border-radius: 10px; text-align: center; }
        .ball-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .ball { width: 40px; height: 40px; background: #d32f2f; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .super-ball { background: #ffb300; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }
        .super-tag { background: #ffb300; color: #333; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 BINGO AI 預測站</h1>
    <div class="update-time" id="update-time">初始化中...</div>

    <div class="section-title">🔮 下期 AI 預測</div>
    <div class="prediction-box">
        <div style="margin-bottom:10px;">預估期號：<strong id="next-period" style="color: #d32f2f;">--</strong></div>
        <div class="ball-container" id="prediction-balls"></div>
    </div>

    <div class="section-title">📊 近 10 期開獎歷史</div>
    <table>
        <thead><tr><th>期號</th><th>開出號碼</th><th>超級獎號</th></tr></thead>
        <tbody id="history-table"><tr><td colspan="3">正在連線伺服器...</td></tr></tbody>
    </table>
</div>

<script>
    async function updateData() {
        const timeEl = document.getElementById('update-time');
        try {
            // 使用更穩定的 corsproxy 服務
            const response = await fetch("https://api.cors.lol/?url=https://api.taiwanlottery.com.tw/TLCAPIWeB/Lottery/BingoBingoResult");
            if (!response.ok) throw new Error("API 請求失敗");
            
            const res = await response.json();
            const content = res.content.slice(0, 10);

            // AI 邏輯
            let allNums = [];
            content.forEach(p => allNums.push(...p.drawNo.map(Number)));
            let counts = {};
            for(let i=1; i<=80; i++) counts[i] = 0;
            allNums.forEach(n => counts[n]++);
            let hotNums = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
            
            let predNums = hotNums.slice(0, 9).map(Number).sort((a,b)=>a-b);
            let superNum = parseInt(hotNums[0]);

            // 更新 UI
            timeEl.innerText = '最後更新：' + new Date().toLocaleTimeString();
            document.getElementById('next-period').innerText = parseInt(content[0].period) + 1;
            document.getElementById('prediction-balls').innerHTML = predNums.map(n => `<div class="ball">${n}</div>`).join('') + `<div class="ball super-ball">${superNum}</div>`;
            document.getElementById('history-table').innerHTML = content.map(p => `<tr><td>${p.period}</td><td>${p.drawNo.join(', ')}</td><td><span class="super-tag">${p.superNo}</span></td></tr>`).join('');
        } catch (e) {
            timeEl.innerText = '連線超時，請點擊網頁重新整理';
            console.error(e);
        }
    }

    updateData();
    setInterval(updateData, 300000); 
</script>
</body>
</html>
