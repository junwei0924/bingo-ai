<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO BINGO 賓果賓果 AI 大數據預測站</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #d32f2f;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .update-time {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: -15px;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            border-left: 5px solid #d32f2f;
            padding-left: 10px;
            margin: 25px 0 15px 0;
        }
        .prediction-box {
            background: #fff5f5;
            border: 2px dashed #ffcdd2;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }
        .ball-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .ball {
            width: 42px;
            height: 42px;
            background: #d32f2f;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 3px 6px rgba(211, 47, 47, 0.3);
        }
        .super-ball {
            background: #ffb300;
            color: #333;
            box-shadow: 0 3px 6px rgba(255, 179, 0, 0.4);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
        }
        .table-super-ball {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: #ffb300;
            color: #333;
            border-radius: 50%;
            line-height: 28px;
            font-weight: bold;
        }
        .history-numbers {
            color: #555;
            letter-spacing: 1px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 BINGO AI 大數據預測站</h1>
    <div class="subtitle">直連台彩官方數據 · 每 5 分鐘即時刷新</div>
    <div class="update-time" id="update-time">最後同步時間：網頁連線中...</div>

    <div class="section-title">🔮 下期 AI 智慧推薦號碼（精選 10 碼組合）</div>
    <div class="prediction-box">
        <div style="font-size: 16px; color: #555;">預估開出期號：<strong id="next-period" style="color: #d32f2f;">--</strong></div>
        <div class="ball-container" id="prediction-balls">
            </div>
    </div>

    <div class="section-title">📊 歷史開獎紀錄（近 20 期真實數據）</div>
    <table>
        <thead>
            <tr>
                <th style="width: 20%;">開獎期號</th>
                <th style="width: 65%;">開出號碼</th>
                <th style="width: 15%;">超級獎號</th>
            </tr>
        </thead>
        <tbody id="history-table">
            <tr>
                <td colspan="3" style="color: #999;">正在即時連線台彩官方資料庫，請稍候...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function fetchLiveTaiwanLottery() {
        console.log("🌐 正在繞過後端，由網頁直攻台彩 API...");
        
        // 使用台彩官方公開即時 API
        const url = "https://api.taiwanlottery.com.tw/TLCAPIWeB/Lottery/BingoBingoResult";
        
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error('連線失敗');
                return response.json();
            })
            .then(resJson => {
                const content = resJson.content || [];
                if (content.length === 0) return;

                let latest_20_periods = [];
                
                // 解析官方回傳的數據
                content.slice(0, 20).forEach(item => {
                    let period_num = String(item.period);
                    let nums = (item.drawNo || []).map(n => parseInt(n)).filter(n => !isNaN(n)).sort((a,b)=>a-b);
                    let super_num = parseInt(item.superNo) || (nums.length > 0 ? nums[0] : 1);
                    
                    if (nums.length === 20) {
                        latest_20_periods.push({
                            period: period_num,
                            numbers: nums,
                            super_num: super_num
                        });
                    }
                });

                // 按期號排序
                latest_20_periods.sort((a, b) => parseInt(b.period) - parseInt(a.period));

                // --- 前端現場熱門大數據精算 (10個號碼) ---
                let all_numbers = [];
                latest_20_periods.forEach(p => all_numbers.push(...p.numbers));
                
                let counts = {};
                for (let i = 1; i <= 80; i++) counts[i] = 0;
                all_numbers.forEach(n => counts[n]++);
                
                let sortedByHot = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).map(Number);
                
                // 挑選出 9 個熱門號碼並排序
                let ai_recommended_nums = [
                    sortedByHot[0], sortedByHot[1], sortedByHot[2],
                    sortedByHot[3], sortedByHot[4], sortedByHot[5],
                    sortedByHot[8], sortedByHot[12], sortedByHot[18]
                ].sort((a,b)=>a-b);
                
                let ai_recommended_super = sortedByHot[0]; // 最熱門的當超級獎號

                // 更新網頁最後同步時間 (顯示當下手機本地時間)
                let now = new Date();
                let timeStr = now.getFullYear() + '-' + 
                              String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                              String(now.getDate()).padStart(2, '0') + ' ' + 
                              String(now.getHours()).padStart(2, '0') + ':' + 
                              String(now.getMinutes()).padStart(2, '0') + ':' + 
                              String(now.getSeconds()).padStart(2, '0');
                
                document.getElementById('update-time').innerText = '最後同步時間：' + timeStr;
                
                // 更新預估下一期期號
                let nextPeriod = String(parseInt(latest_20_periods[0].period) + 1);
                document.getElementById('next-period').innerText = nextPeriod;

                // 渲染 10 顆預測球
                let predictionHtml = '';
                ai_recommended_nums.forEach(num => {
                    predictionHtml += `<div class="ball">${String(num).padStart(2, '0')}</div>`;
                });
                predictionHtml += `<div class="ball super-ball" title="超級獎號">${String(ai_recommended_super).padStart(2, '0')}</div>`;
                document.getElementById('prediction-balls').innerHTML = predictionHtml;

                // 渲染歷史表格
                let tableHtml = '';
                latest_20_periods.forEach(period => {
                    let formattedNumbers = period.numbers.map(n => String(n).padStart(2, '0')).join(' ');
                    tableHtml += `
                        <tr>
                            <td style="font-weight: bold; color: #444;">${period.period}</td>
                            <td class="history-numbers">${formattedNumbers}</td>
                            <td><span class="table-super-ball">${String(period.super_num).padStart(2, '0')}</span></td>
                        </tr>
                    `;
                });
                document.getElementById('history-table').innerHTML = tableHtml;
                console.log('🎰 台彩真實大數據網頁端現場解算完成！');
            })
            .catch(error => {
                console.error('❌ 直連台彩失敗:', error);
                document.getElementById('history-table').innerHTML = `<tr><td colspan="3" style="color: red;">連線失敗，正在嘗試重新連線...</td></tr>`;
            });
    }

    // 網頁打開立刻執行
    fetchLiveTaiwanLottery();

    // 每 5 分鐘 (300000 毫秒) 自動重新向官方資料庫抓取最新開獎
    setInterval(fetchLiveTaiwanLottery, 300000);
</script>

</body>
</html>
