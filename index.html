<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO BINGO 賓果賓果 AI 大數據預測站</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #d32f2f; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        .update-time { text-align: center; font-size: 12px; color: #999; margin-top: -15px; margin-bottom: 25px; }
        .section-title { font-size: 18px; font-weight: bold; border-left: 5px solid #d32f2f; padding-left: 10px; margin: 25px 0 15px 0; }
        .prediction-box { background: #fff5f5; border: 2px dashed #ffcdd2; padding: 25px; border-radius: 10px; text-align: center; }
        .ball-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 15px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .ball { width: 42px; height: 42px; background: #d32f2f; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; box-shadow: 0 3px 6px rgba(211, 47, 47, 0.3); }
        .super-ball { background: #ffb300; color: #333; box-shadow: 0 3px 6px rgba(255, 179, 0, 0.4); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #555; }
        .table-super-ball { display: inline-block; width: 28px; height: 28px; background: #ffb300; color: #333; border-radius: 50%; line-height: 28px; font-weight: bold; }
        .history-numbers { color: #555; letter-spacing: 1px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 BINGO AI 大數據預測站</h1>
    <div class="subtitle">同步台彩官網數據 · 每 5 分鐘自動刷新</div>
    <div class="update-time" id="update-time">最後同步時間：載入中...</div>

    <div class="section-title">🔮 下期 AI 智慧推薦號碼（精選 10 碼組合）</div>
    <div class="prediction-box">
        <div style="font-size: 16px; color: #555;">預估開出期號：<strong id="next-period" style="color: #d32f2f;">--</strong></div>
        <div class="ball-container" id="prediction-balls"></div>
    </div>

    <div class="section-title">📊 歷史開獎紀錄（近 20 期真實數據）</div>
    <table>
        <thead>
            <tr><th style="width: 20%;">開獎期號</th><th style="width: 65%;">開出號碼</th><th style="width: 15%;">超級獎號</th></tr>
        </thead>
        <tbody id="history-table">
            <tr><td colspan="3" style="color: #999;">正在連線資料庫，請稍候...</td></tr>
        </tbody>
    </table>
</div>

<script>
    function fetchData() {
        // 強制加上時間戳防快取
        fetch('data.json?t=' + new Date().getTime())
            .then(response => {
                if (!response.ok) throw new Error('找不到數據檔案');
                return response.json();
            })
            .then(data => {
                if (!data.last_updated) return;
                
                document.getElementById('update-time').innerText = '最後同步時間：' + data.last_updated;
                document.getElementById('next-period').innerText = data.prediction.next_period;
                
                let predictionHtml = '';
                data.prediction.recommended_numbers.forEach(num => {
                    predictionHtml += `<div class="ball">${String(num).padStart(2, '0')}</div>`;
                });
                predictionHtml += `<div class="ball super-ball" title="超級獎號">${String(data.prediction.recommended_super_number).padStart(2, '0')}</div>`;
                document.getElementById('prediction-balls').innerHTML = predictionHtml;

                let tableHtml = '';
                data.latest_data.forEach(period => {
                    let formattedNumbers = period.numbers.map(n => String(n).padStart(2, '0')).join(' ');
                    tableHtml += `
                        <tr>
                            <td style="font-weight: bold; color: #444;">${period.period}</td>
                            <td class="history-numbers">${formattedNumbers}</td>
                            <td><span class="table-super-ball">${String(period.super_num).padStart(2, '0')}</span></td>
                        </tr>
                    `;
                });
                document.getElementById('history-table').innerHTML = tableHtml;
            })
            .catch(error => {
                console.error('讀取失敗:', error);
                document.getElementById('history-table').innerHTML = `<tr><td colspan="3" style="color: #999;">等待後端機器人第一次寫入數據，請稍後手動重新整理...</td></tr>`;
            });
    }

    fetchData();
    setInterval(fetchData, 300000); // 5分鐘自動背景刷新
</script>
</body>
</html>
