<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BINGO AI</title>
</head>
<body>
    <div id="update-time">初始化...</div>
    <div id="next-period"></div>
    <div id="prediction-balls"></div>
    <table id="history-table"></table>

    <script>
    async function updateData() {
        const timeEl = document.getElementById('update-time');
        const targetUrl = "https://api.taiwanlottery.com.tw/TLCAPIWeB/Lottery/BingoBingoResult";
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);
        
        try {
            const response = await fetch(proxyUrl);
            const rawData = await response.json();
            const res = JSON.parse(rawData.contents);
            const content = res.content.slice(0, 10);

            let allNums = [];
            content.forEach(p => allNums.push(...p.drawNo.map(Number)));
            let counts = {};
            for(let i=1; i<=80; i++) counts[i] = 0;
            allNums.forEach(n => counts[n]++);
            let hotNums = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
            
            let predNums = hotNums.slice(0, 9).map(Number).sort((a,b)=>a-b);
            let superNum = parseInt(hotNums[0]);

            timeEl.innerText = '最後更新：' + new Date().toLocaleTimeString();
            document.getElementById('next-period').innerText = '預測期號：' + (parseInt(content[0].period) + 1);
            document.getElementById('prediction-balls').innerHTML = predNums.map(n => '<span>' + n + '</span>').join(' ') + ' 超級獎號：' + superNum;
            document.getElementById('history-table').innerHTML = content.map(p => '<tr><td>' + p.period + '</td><td>' + p.drawNo.join(',') + '</td><td>' + p.superNo + '</td></tr>').join('');
            
        } catch (e) {
            timeEl.innerText = '連線失敗，請刷新重試';
        }
    }
    updateData();
    setInterval(updateData, 300000);
    </script>
</body>
</html>
