<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BINGO AI 測試中</title>
</head>
<body>
    <div id="status">開始執行...</div>
    <div id="content"></div>

    <script>
        async function test() {
            const status = document.getElementById('status');
            status.innerText = "正在連線...";
            try {
                // 改用這個公開的 API 轉接器
                const response = await fetch("https://api.allorigins.win/get?url=https://api.taiwanlottery.com.tw/TLCAPIWeB/Lottery/BingoBingoResult");
                if (!response.ok) throw new Error("HTTP 錯誤");
                const data = await response.json();
                status.innerText = "資料已抓取！正在解析...";
                const res = JSON.parse(data.contents);
                document.getElementById('content').innerText = "最新一期號碼: " + res.content[0].drawNo.join(', ');
            } catch (e) {
                status.innerText = "失敗: " + e.message;
            }
        }
        test();
    </script>
</body>
</html>
